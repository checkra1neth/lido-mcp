<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a3ff"/>
      <stop offset="100%" style="stop-color:#5bc0ff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a3ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#5bc0ff;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00a3ff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="none" stroke="#00a3ff" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="150" r="150" fill="none" stroke="#00a3ff" stroke-width="1" opacity="0.05"/>
  <circle cx="250" cy="500" r="180" fill="none" stroke="#00a3ff" stroke-width="1" opacity="0.06"/>

  <!-- Lido-style stETH icon -->
  <g transform="translate(100, 120)">
    <!-- Outer ring -->
    <circle cx="80" cy="80" r="70" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <!-- Inner ETH diamond -->
    <polygon points="80,25 120,80 80,100 40,80" fill="none" stroke="#00a3ff" stroke-width="2.5" opacity="0.9"/>
    <polygon points="80,100 120,80 80,135 40,80" fill="none" stroke="#5bc0ff" stroke-width="2" opacity="0.6"/>
    <!-- Liquid effect dots -->
    <circle cx="80" cy="80" r="4" fill="#00a3ff" opacity="0.5"/>
    <circle cx="60" cy="95" r="2.5" fill="#00a3ff" opacity="0.3"/>
    <circle cx="100" cy="65" r="2" fill="#5bc0ff" opacity="0.4"/>
    <circle cx="55" cy="70" r="1.5" fill="#5bc0ff" opacity="0.3"/>
    <circle cx="105" cy="90" r="2" fill="#00a3ff" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="100" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">Lido MCP Server</text>

  <!-- Subtitle -->
  <text x="102" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8899aa" letter-spacing="0.5">AI agents meet liquid staking</text>

  <!-- Accent line -->
  <rect x="100" y="380" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Feature pills -->
  <g transform="translate(100, 420)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="140" height="36" rx="18" fill="none" stroke="#00a3ff" stroke-width="1.5" opacity="0.5"/>
    <text x="70" y="23" font-family="monospace" font-size="14" fill="#00a3ff" text-anchor="middle">11 Tools</text>

    <!-- Pill 2 -->
    <rect x="160" y="0" width="140" height="36" rx="18" fill="none" stroke="#00a3ff" stroke-width="1.5" opacity="0.5"/>
    <text x="230" y="23" font-family="monospace" font-size="14" fill="#00a3ff" text-anchor="middle">Dry Run</text>

    <!-- Pill 3 -->
    <rect x="320" y="0" width="180" height="36" rx="18" fill="none" stroke="#00a3ff" stroke-width="1.5" opacity="0.5"/>
    <text x="410" y="23" font-family="monospace" font-size="14" fill="#00a3ff" text-anchor="middle">stETH + wstETH</text>

    <!-- Pill 4 -->
    <rect x="520" y="0" width="170" height="36" rx="18" fill="none" stroke="#00a3ff" stroke-width="1.5" opacity="0.5"/>
    <text x="605" y="23" font-family="monospace" font-size="14" fill="#00a3ff" text-anchor="middle">Governance</text>
  </g>

  <!-- Terminal preview on the right -->
  <g transform="translate(720, 230)">
    <rect x="0" y="0" width="420" height="300" rx="12" fill="#0d1117" stroke="#1a2a3a" stroke-width="2"/>
    <!-- Terminal header -->
    <rect x="0" y="0" width="420" height="36" rx="12" fill="#161b22"/>
    <rect x="0" y="24" width="420" height="12" fill="#161b22"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="210" y="22" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">claude-code</text>

    <!-- Terminal content -->
    <text x="16" y="64" font-family="monospace" font-size="13" fill="#7ee787">$</text>
    <text x="30" y="64" font-family="monospace" font-size="13" fill="#c9d1d9"> Stake 0.1 ETH with Lido</text>

    <text x="16" y="92" font-family="monospace" font-size="12" fill="#8b949e">Using mcp__lido__lido_stake</text>

    <text x="16" y="120" font-family="monospace" font-size="12" fill="#f0883e">amount:</text>
    <text x="80" y="120" font-family="monospace" font-size="12" fill="#c9d1d9"> "0.1"</text>

    <text x="16" y="144" font-family="monospace" font-size="12" fill="#f0883e">dry_run:</text>
    <text x="88" y="144" font-family="monospace" font-size="12" fill="#79c0ff"> true</text>

    <text x="16" y="176" font-family="monospace" font-size="12" fill="#7ee787">Staking 0.1 ETH for stETH</text>
    <text x="16" y="196" font-family="monospace" font-size="12" fill="#8b949e">Gas estimate: 0.00042 ETH</text>
    <text x="16" y="216" font-family="monospace" font-size="12" fill="#8b949e">To: 0xae7ab...4dF2</text>

    <text x="16" y="248" font-family="monospace" font-size="13" fill="#7ee787">$</text>
    <text x="30" y="248" font-family="monospace" font-size="13" fill="#c9d1d9"> Execute it for real</text>

    <text x="16" y="276" font-family="monospace" font-size="12" fill="#7ee787">Tx: 0x0e2074...a8f3</text>
    <rect x="16" y="262" width="8" height="16" fill="#c9d1d9" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#00a3ff" opacity="0.08"/>
  <text x="600" y="620" font-family="monospace" font-size="12" fill="#5bc0ff" text-anchor="middle" opacity="0.6">MCP  ·  Ethereum  ·  Claude Code  ·  Cursor  ·  Cline</text>
</svg>
